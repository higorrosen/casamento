<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ana Caroline e Higor</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Libertinus+Serif+Display&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1 class="title">Ana Caroline e Higor</h1>
    <div class="image-wrapper">
      <img src="images/inicial.png" alt="Ana e Higor em um campo florido" class="photo">
    </div>
    <div class="footer">
      <span class="left">16 DE FEVEREIRO DE 2026</span>
      <span class="right">SÃO JOSÉ DOS PINHAIS</span>
    </div>
  </div>

  <section class="section-ilustracao">
    <div class="image-side">
      <img src="images/beijo.png" alt="Ilustração de um beijo romântico de Ana e Higor" class="desenho">
    </div>
    <div class="countdown-side">
      <div class="count-item">
        <span id="days">00</span>
        <small>dias</small>
      </div>
      <div class="count-item">
        <span id="hours">00</span>
        <small>horas</small>
      </div>
      <div class="count-item">
        <span id="minutes">00</span>
        <small>minutos</small>
      </div>
      <div class="count-item">
        <span id="seconds">00</span>
        <small>segundos</small>
      </div>
    </div>
  </section>

  <section class="local">
  <div class="local-header">
    <h2>O Local</h2>

    <div class="mapa">
      <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3598.249047939803!2d-49.1245342!3d-25.596639300000003!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94dc58aa86b4d81d%3A0x468665cd9851740!2sCh%C3%A1cara%20Illustratti!5e0!3m2!1spt-BR!2sbr!4v1756332264145!5m2!1spt-BR!2sbr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>
  </div>

  <div class="local-gallery">
    <a href="https://www.instagram.com/chacaraillustratti" target="_blank">
      <img src="images/illustratti.png" alt="Imagem do local">
    </a>
    <a href="https://www.instagram.com/chacaraillustratti" target="_blank">
      <img src="images/illustratti2.png" alt="Imagem do local">
    </a>
    <a href="https://www.instagram.com/chacaraillustratti" target="_blank">
      <img src="images/illustratti3.png" alt="Imagem do local">
    </a>

  </div>
</section>

  <script src="script.js"></script>
</body>
</html>
